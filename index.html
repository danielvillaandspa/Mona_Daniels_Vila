<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Daniel's Villa &amp; Spa</title>

  <meta name="description" content="Daniel's Villa &amp; Spa in Isfiya — a luxury villa with indoor spa, heated pool, jacuzzi, sauna, rooms, and garden." />
  <meta name="google-site-verification" content="X8VOJh0BGQdSi8he-nXdfieGbgTP-GPlcm4Dx2NFQVk" />
  <link rel="canonical" href="https://danielvillaspa.site/" />

  <!-- Google tag (gtag.js) -->
  <script async src="https://www.googletagmanager.com/gtag/js?id=G-NBWGZT6BZK"></script>
  <script>
    window.dataLayer = window.dataLayer || [];
    function gtag(){dataLayer.push(arguments);}
    gtag('js', new Date());
    gtag('config', 'G-NBWGZT6BZK');
  </script>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300;1,400&family=Frank+Ruhl+Libre:wght@300;400;500&family=Tajawal:wght@200;300;400;500&family=Montserrat:wght@200;300;400;500&display=swap" rel="stylesheet">

  <style>
    :root{
      --gold:#b8935a;
      --gold2:#d4af7a;
      --gold3:#e8d5b0;
      --bg:#f8f4ed;
      --bg2:#f1eadf;
      --bg3:#ebe1d1;
      --bg4:#e5dac8;
      --text:#181818;
      --muted:#6a6258;
      --muted2:#8a8074;
      --line:rgba(184,147,90,.18);
      --line2:rgba(184,147,90,.10);
      --card:#fffdf9;
    }

    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    html{scroll-behavior:smooth}

    body{
      font-family:'Frank Ruhl Libre',serif;
      background:var(--bg);
      color:var(--text);
      overflow-x:hidden;
      direction:rtl;
      min-height:100%;
    }
    body.lang-en{font-family:'Montserrat',sans-serif;direction:ltr}
    body.lang-ar{font-family:'Tajawal',sans-serif;direction:rtl}

    body::before{
      content:'';
      position:fixed;
      inset:0;
      background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='4'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.03'/%3E%3C/svg%3E");
      pointer-events:none;
      opacity:.10;
      z-index:9990;
    }

    /* LANG SWITCHER */
    .lsw{
      position:fixed;
      top:18px;
      left:18px;
      z-index:2000;
      display:flex;
      gap:4px;
      background:rgba(255,255,255,.82);
      backdrop-filter:blur(14px);
      border:1px solid var(--line);
      padding:4px 8px;
      border-radius:26px;
      box-shadow:0 8px 24px rgba(0,0,0,.05);
    }
    body.lang-en .lsw{left:auto;right:18px}

    .lbtn{
      background:none;
      border:none;
      color:var(--muted);
      font-size:11px;
      letter-spacing:1px;
      padding:5px 10px;
      border-radius:18px;
      cursor:pointer;
      transition:.3s;
      font-family:inherit;
    }
    .lbtn.active{background:var(--gold);color:#fff;font-weight:500}
    .lbtn:hover:not(.active){color:var(--gold)}

    /* WHATSAPP */
    .wa{
      position:fixed;
      bottom:22px;
      right:22px;
      z-index:3000;
      display:flex;
      align-items:center;
      gap:8px;
      background:#25D366;
      color:#fff;
      padding:11px 16px 11px 13px;
      border-radius:50px;
      text-decoration:none;
      box-shadow:0 6px 24px rgba(37,211,102,.30);
      transition:.3s;
      animation:wap 3s ease-in-out infinite;
    }
    .wa:hover{transform:translateY(-3px) scale(1.03);animation:none;box-shadow:0 12px 34px rgba(37,211,102,.42)}
    @keyframes wap{
      0%,100%{box-shadow:0 6px 24px rgba(37,211,102,.30)}
      50%{box-shadow:0 6px 34px rgba(37,211,102,.46)}
    }
    .wa svg{width:22px;height:22px;flex-shrink:0}
    .wa-t{font-size:11px;font-weight:500;white-space:nowrap}

    /* NAV */
    nav{
      position:fixed;
      top:0;left:0;right:0;
      padding:20px 60px;
      display:flex;
      justify-content:space-between;
      align-items:center;
      z-index:1000;
      background:rgba(255,255,255,.76);
      backdrop-filter:blur(14px);
      border-bottom:1px solid var(--line2);
      transition:.35s;
    }
    nav.sc{
      background:rgba(255,255,255,.96);
      box-shadow:0 10px 24px rgba(0,0,0,.04);
      border-bottom-color:var(--line);
      padding:13px 60px;
    }
    .nl{text-decoration:none;display:flex;flex-direction:column;gap:2px}
    .nlm{
      font-family:'Cormorant Garamond','Frank Ruhl Libre',serif;
      font-size:19px;letter-spacing:4px;text-transform:uppercase;color:var(--gold);font-weight:400;
    }
    .nls{font-size:9px;letter-spacing:4px;text-transform:uppercase;color:var(--muted)}

    nav ul{list-style:none;display:flex;gap:28px;align-items:center}
    nav ul a{
      color:var(--muted);text-decoration:none;font-size:10px;letter-spacing:2px;
      text-transform:uppercase;transition:.3s;position:relative;
    }
    nav ul a::after{
      content:'';position:absolute;bottom:-3px;right:0;
      width:0;height:1px;background:var(--gold);transition:.3s;
    }
    body.lang-en nav ul a::after{right:auto;left:0}
    nav ul a:hover{color:var(--gold)}
    nav ul a:hover::after{width:100%}
    .ncta{padding:8px 18px !important;border:1px solid var(--gold) !important;color:var(--gold) !important;border-radius:1px}
    .ncta:hover{background:var(--gold) !important;color:#fff !important}
    .ncta::after{display:none !important}

    /* HERO */
    .hero{
      min-height:100svh;position:relative;display:flex;align-items:flex-end;
      padding:0 60px 58px;overflow:hidden;
      background:linear-gradient(155deg,#f8f3ea,#efe6d8 45%,#f7f4ee);
      color:var(--text);
    }
    .hbg{
      position:absolute;inset:0;
      background:linear-gradient(155deg,#f8f3ea,#efe6d8 45%,#f7f4ee);z-index:0;
    }
    .hslides{position:absolute;inset:0;z-index:1}
    .hs{
      position:absolute;inset:0;background-size:cover;background-position:center;
      opacity:0;transition:opacity 1.5s;transform:scale(1.05);
      filter:saturate(.95) contrast(1.02);
    }
    .hs.on{opacity:.10;animation:hz 20s ease-in-out infinite alternate}
    @keyframes hz{from{transform:scale(1.05)}to{transform:scale(1.12)}}
    .hov{
      position:absolute;inset:0;
      background:linear-gradient(to top,rgba(247,244,238,.96) 0%,rgba(247,244,238,.30) 52%,rgba(247,244,238,.08) 100%);
      z-index:2;
    }
    .hc{position:relative;z-index:3;max-width:740px;padding-top:70px}
    .heye{
      display:flex;align-items:center;gap:12px;margin-bottom:16px;
      color:var(--gold);font-size:10px;letter-spacing:5px;text-transform:uppercase;
    }
    .heye::before{content:'';width:32px;height:1px;background:var(--gold);flex-shrink:0}
    .hero h1{
      font-family:'Cormorant Garamond','Frank Ruhl Libre',serif;
      font-size:clamp(44px,7vw,84px);font-weight:300;line-height:1.05;
      color:var(--text);margin-bottom:14px;
    }
    .hero h1 em{font-style:italic;color:var(--gold)}
    .hdesc{max-width:540px;font-size:14px;line-height:2.05;color:var(--muted);margin-bottom:34px}
    .hbtns{display:flex;gap:14px;flex-wrap:wrap}
    .bp,.bg{
      display:inline-block;text-decoration:none;font-size:10px;
      letter-spacing:2px;text-transform:uppercase;transition:.3s;padding:13px 36px;
    }
    .bp{background:var(--gold);color:#fff;font-weight:500;box-shadow:0 10px 20px rgba(184,147,90,.16)}
    .bp:hover{background:var(--gold2);transform:translateY(-2px)}
    .bg{border:1px solid rgba(184,147,90,.36);color:var(--text);background:rgba(255,255,255,.34)}
    .bg:hover{border-color:var(--gold);color:var(--gold)}

    /* DIVIDER */
    .dv{height:1px;background:linear-gradient(to right,transparent,var(--gold),transparent);opacity:.22}

    /* SECTIONS */
    .sec{padding:104px 60px}
    .sec-base{background:var(--bg)}
    .sec-alt{background:var(--bg2)}
    .sec-deep{background:var(--bg3)}

    .sl{
      display:flex;align-items:center;gap:12px;color:var(--gold);
      font-size:9px;letter-spacing:5px;text-transform:uppercase;margin-bottom:14px;
    }
    .sl::before{content:'';width:24px;height:1px;background:var(--gold);flex-shrink:0}

    /* ABOUT */
    .ag{display:grid;grid-template-columns:1fr 1fr;gap:80px;align-items:center}
    .aleft{position:relative;min-height:500px}

    .img-shell{
      position:relative;background:var(--card);padding:12px;
      border:1px solid rgba(184,147,90,.14);border-radius:22px;
      box-shadow:0 18px 40px rgba(0,0,0,.07);overflow:hidden;
    }
    .img-shell img{
      display:block;width:100%;height:100%;object-fit:cover;
      border-radius:14px;filter:saturate(.96) contrast(1.02);
    }
    .aim{width:100%;height:490px}
    .aima{position:absolute;width:46%;height:220px;right:-20px;bottom:-22px}
    body.lang-en .aima{right:-20px;left:auto}

    .aright h2{
      font-family:'Cormorant Garamond','Frank Ruhl Libre',serif;
      font-size:clamp(32px,4vw,54px);font-weight:300;line-height:1.15;
      margin-bottom:18px;color:var(--text);
    }
    .aright h2 em{font-style:italic;color:var(--gold)}
    .aright p{color:var(--muted);font-size:14px;line-height:2.1;margin-bottom:13px}
    .afeats{display:grid;grid-template-columns:1fr 1fr;gap:14px;margin-top:32px}
    .afeat{
      padding:15px;background:#fff;border-right:2px solid rgba(184,147,90,.18);
      transition:.3s;box-shadow:0 10px 24px rgba(0,0,0,.04);
    }
    body.lang-en .afeat{border-right:none;border-left:2px solid rgba(184,147,90,.18)}
    .afeat:hover{border-color:var(--gold)}
    .afeat h4{color:var(--gold);font-size:10px;letter-spacing:2px;text-transform:uppercase;margin-bottom:4px}
    .afeat p{margin:0;font-size:12px;line-height:1.7;color:var(--muted)}

    /* POOL */
    .pool-sec h2{
      font-family:'Cormorant Garamond','Frank Ruhl Libre',serif;
      font-size:clamp(32px,4vw,54px);font-weight:300;line-height:1.15;
      color:var(--text);margin-bottom:14px;
    }
    .pool-sec h2 em{font-style:italic;color:var(--gold)}
    .pool-sec>p{color:var(--muted);font-size:14px;line-height:2;margin-bottom:44px;max-width:600px}
    .pool-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin-bottom:8px}
    .pool-grid-2{display:grid;grid-template-columns:2fr 1fr 1fr;gap:8px}
    .pg-item{position:relative;overflow:hidden;cursor:zoom-in}
    .pg-item .img-shell{height:100%;border-radius:20px}
    .pg-item .img-shell img{border-radius:12px}
    .pg-ov{
      position:absolute;inset:12px;border-radius:18px;
      background:linear-gradient(to top,rgba(0,0,0,.48) 0%,transparent 58%);
      opacity:0;transition:.35s;display:flex;align-items:flex-end;padding:14px;pointer-events:none;
    }
    .pg-item:hover .pg-ov{opacity:1}
    .pglbl{color:var(--gold3);font-size:9px;letter-spacing:3px;text-transform:uppercase;text-shadow:0 2px 10px rgba(0,0,0,.28)}

    /* ROOMS */
    .rooms-sec h2{
      font-family:'Cormorant Garamond','Frank Ruhl Libre',serif;
      font-size:clamp(32px,4vw,54px);font-weight:300;line-height:1.15;
      color:var(--text);margin-bottom:14px;
    }
    .rooms-sec h2 em{font-style:italic;color:var(--gold)}
    .rooms-sec>p{color:var(--muted);font-size:14px;line-height:2;margin-bottom:44px;max-width:650px}
    .rooms-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:10px}
    .room-card{position:relative;overflow:hidden;cursor:zoom-in}
    .room-card .img-shell{height:100%;border-radius:22px}
    .room-card .img-shell img{height:300px}
    .room-ov{
      position:absolute;inset:12px;border-radius:18px;
      background:linear-gradient(to top,rgba(0,0,0,.56) 0%,transparent 100%);
      padding:18px 16px 16px;transform:translateY(8px);opacity:0;transition:.4s;
      display:flex;flex-direction:column;justify-content:flex-end;pointer-events:none;
    }
    .room-card:hover .room-ov{opacity:1;transform:translateY(0)}
    .rtitle{
      font-family:'Cormorant Garamond','Frank Ruhl Libre',serif;
      font-size:16px;color:#fff;margin-bottom:3px;text-shadow:0 2px 12px rgba(0,0,0,.25);
    }
    .rsub{font-size:9px;letter-spacing:2px;color:var(--gold3);text-transform:uppercase;text-shadow:0 2px 12px rgba(0,0,0,.25)}

    /* GALLERY */
    .gal-head{display:flex;justify-content:space-between;align-items:flex-end;margin-bottom:40px}
    .gal-head h2{
      font-family:'Cormorant Garamond','Frank Ruhl Libre',serif;
      font-size:clamp(32px,4vw,54px);font-weight:300;line-height:1.15;color:var(--text);
    }
    .gal-head h2 em{font-style:italic;color:var(--gold)}
    .gcnt{color:var(--muted);font-size:10px;letter-spacing:3px;text-transform:uppercase}
    .ggrid{display:grid;grid-template-columns:repeat(4,1fr);gap:8px}
    .gi{position:relative;overflow:hidden;aspect-ratio:4/3;cursor:zoom-in}
    .gi .img-shell{height:100%;border-radius:20px}
    .gov{
      position:absolute;inset:12px;border-radius:18px;
      background:linear-gradient(to top,rgba(0,0,0,.50) 0%,transparent 58%);
      opacity:0;transition:.32s;display:flex;align-items:flex-end;padding:13px;pointer-events:none;
    }
    .gi:hover .gov{opacity:1}
    .glbl{color:var(--gold3);font-size:9px;letter-spacing:3px;text-transform:uppercase;text-shadow:0 2px 10px rgba(0,0,0,.28)}

    /* FEATURES */
    .fh h2{
      font-family:'Cormorant Garamond','Frank Ruhl Libre',serif;
      font-size:clamp(32px,4vw,54px);font-weight:300;line-height:1.15;
      color:var(--text);margin-bottom:48px;
    }
    .fh h2 em{font-style:italic;color:var(--gold)}
    .fgrid{display:grid;grid-template-columns:repeat(3,1fr);gap:2px}
    .fc{
      background:#fff;padding:42px 34px;position:relative;overflow:hidden;
      transition:.4s;border:1px solid var(--line2);
      box-shadow:0 12px 30px rgba(0,0,0,.04);
      display:flex;flex-direction:column;justify-content:flex-start;min-height:220px;
    }
    .fc::before{
      content:'';position:absolute;top:0;right:0;width:100%;height:2px;
      background:linear-gradient(to left,var(--gold),transparent);
      transform:scaleX(0);transform-origin:right;transition:.4s;
    }
    body.lang-en .fc::before{transform-origin:left;background:linear-gradient(to right,var(--gold),transparent)}
    .fc:hover{background:var(--bg4)}
    .fc:hover::before{transform:scaleX(1)}
    .fnum{
      font-family:'Cormorant Garamond',serif;font-size:50px;font-weight:300;
      color:rgba(184,147,90,.16);line-height:1;margin-bottom:14px;transition:.4s;
    }
    .fc:hover .fnum{color:rgba(184,147,90,.28)}
    .ficon{font-size:24px;margin-bottom:14px}
    .fc h3{
      font-family:'Cormorant Garamond','Frank Ruhl Libre',serif;
      font-size:20px;font-weight:400;color:var(--gold);margin-bottom:10px;
    }
    .fc p{font-size:12px;line-height:1.9;color:var(--muted)}

    /* QUOTE */
    .quote{
      background:linear-gradient(135deg,var(--gold),var(--gold2));
      color:#fff;text-align:center;padding:70px 60px;position:relative;overflow:hidden;
    }
    .quote::before{
      content:'"';font-family:'Cormorant Garamond',serif;font-size:340px;
      color:rgba(255,255,255,.10);position:absolute;top:-50px;left:50%;
      transform:translateX(-50%);line-height:1;pointer-events:none;
    }
    .quote blockquote{
      font-family:'Cormorant Garamond','Frank Ruhl Libre',serif;
      font-size:clamp(20px,3vw,32px);font-style:italic;font-weight:300;
      max-width:820px;margin:0 auto 14px;line-height:1.6;position:relative;
    }
    .quote cite{font-size:10px;letter-spacing:4px;text-transform:uppercase;color:rgba(255,255,255,.78)}

    /* CONTACT */
    .cg{display:grid;grid-template-columns:1fr 1fr;gap:80px;align-items:center}
    .cleft h2{
      font-family:'Cormorant Garamond','Frank Ruhl Libre',serif;
      font-size:clamp(32px,4vw,54px);font-weight:300;line-height:1.15;
      color:var(--text);margin-bottom:16px;
    }
    .cleft h2 em{font-style:italic;color:var(--gold)}
    .cleft>p{color:var(--muted);font-size:14px;line-height:2;margin-bottom:36px}
    .citems{display:flex;flex-direction:column}
    .ci{
      display:flex;align-items:center;gap:16px;padding:18px 0;
      border-bottom:1px solid var(--line2);text-decoration:none;color:inherit;transition:.3s;
    }
    .ci:hover{padding-right:8px}
    body.lang-en .ci:hover{padding-right:0;padding-left:8px}
    .cico{
      width:40px;height:40px;display:flex;align-items:center;justify-content:center;
      border:1px solid rgba(184,147,90,.26);flex-shrink:0;transition:.3s;
      font-size:15px;background:#fff;box-shadow:0 10px 20px rgba(0,0,0,.03);
    }
    .ci:hover .cico{background:var(--gold);border-color:var(--gold);color:#fff}
    .clbl{display:block;color:var(--gold);font-size:9px;letter-spacing:3px;text-transform:uppercase;margin-bottom:3px}
    .cval{color:var(--text);font-size:13px}
    .cright{position:relative;min-height:520px}
    .cimg{width:100%;height:500px}
    .cimga{position:absolute;width:50%;height:200px;left:-22px;bottom:-22px}
    body.lang-en .cimga{left:-22px;right:auto}

    /* SOCIAL */
    .socrow{display:flex;justify-content:center;gap:12px;padding:40px 60px 0;background:var(--bg)}
    .socl{
      width:44px;height:44px;border:1px solid rgba(184,147,90,.20);
      border-radius:50%;display:flex;align-items:center;justify-content:center;
      text-decoration:none;color:var(--muted);transition:.28s;
      background:#fff;box-shadow:0 10px 20px rgba(0,0,0,.03);
    }
    .socl:hover{background:var(--gold);border-color:var(--gold);color:#fff;transform:translateY(-3px)}
    .ig-l{font-size:0}
    .ig-l svg{width:18px;height:18px}

    /* MAP */
    .mapsec{
      height:340px;background:var(--bg2);position:relative;overflow:hidden;
      margin-top:40px;border-top:1px solid var(--line2);border-bottom:1px solid var(--line2);
    }
    .mapsec iframe{width:100%;height:100%;border:0;filter:grayscale(100%) contrast(85%);opacity:.55}
    .mapov{
      position:absolute;inset:0;
      background:linear-gradient(to right,var(--bg) 0%,transparent 22%,transparent 78%,var(--bg) 100%);
      pointer-events:none;
    }
    .mappin{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);text-align:center;pointer-events:none}
    .mapdot{width:12px;height:12px;background:var(--gold);border-radius:50%;margin:0 auto 7px;animation:pp 2s ease-in-out infinite}
    @keyframes pp{
      0%,100%{box-shadow:0 0 0 4px rgba(184,147,90,.18),0 0 0 8px rgba(184,147,90,.07)}
      50%{box-shadow:0 0 0 8px rgba(184,147,90,.18),0 0 0 16px rgba(184,147,90,.04)}
    }
    .maplbl{color:var(--gold);font-size:10px;letter-spacing:3px;text-transform:uppercase;white-space:nowrap}

    /* FOOTER */
    footer{
      display:flex;justify-content:space-between;align-items:center;
      gap:16px;flex-wrap:wrap;padding:44px 60px;
      background:#fff;border-top:1px solid var(--line2);color:var(--text);
    }
    .flogo{font-family:'Cormorant Garamond',serif;font-size:20px;letter-spacing:4px;color:var(--gold);text-transform:uppercase}
    .fcopy{color:var(--muted);font-size:11px}
    .fcopy span{color:var(--gold)}
    .flinks{display:flex;gap:22px;flex-wrap:wrap}
    .flinks a{color:var(--muted);text-decoration:none;font-size:10px;letter-spacing:2px;text-transform:uppercase;transition:.3s}
    .flinks a:hover{color:var(--gold)}

    /* LIGHTBOX */
    .lb{display:none;position:fixed;inset:0;background:rgba(255,255,255,.96);z-index:9999;align-items:center;justify-content:center}
    .lb.open{display:flex}
    .lb img{max-width:90vw;max-height:88vh;object-fit:contain;border:1px solid var(--line);background:#fff;box-shadow:0 14px 36px rgba(0,0,0,.08)}
    .lbx{position:absolute;top:18px;right:24px;background:none;border:none;color:var(--gold);font-size:30px;cursor:pointer;z-index:10000;line-height:1}
    .lbp,.lbn{
      position:absolute;top:50%;transform:translateY(-50%);
      background:rgba(184,147,90,.10);border:1px solid rgba(184,147,90,.22);
      color:var(--gold);font-size:22px;padding:13px 17px;cursor:pointer;transition:.3s;z-index:10000;
    }
    .lbp{left:18px}
